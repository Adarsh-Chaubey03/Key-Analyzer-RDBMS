<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBMS Key Analyzer - Candidate Keys and Superkeys</title>
    <meta
        name="description"
        content="Analyze relational schemas and functional dependencies to compute candidate keys and superkeys."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="app-container">
        <header class="app-header">
            <div class="header-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <ellipse cx="12" cy="5" rx="9" ry="3"/>
                    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
                    <path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/>
                </svg>
            </div>
            <div>
                <h1>Key Analyzer</h1>
                <p class="header-sub">RDBMS functional dependency engine</p>
            </div>
        </header>

        <main class="main-grid">
            <section class="panel input-panel">
                <div class="panel-header">
                    <span class="panel-dot"></span>
                    <span class="panel-dot"></span>
                    <span class="panel-dot"></span>
                    <span class="panel-title">Input</span>
                </div>
                <div class="panel-body">
                    <div class="form-group">
                        <label for="attributes-input">
                            <span class="label-icon">R</span> Relation Attributes
                        </label>
                        <input
                            type="text"
                            id="attributes-input"
                            placeholder="e.g. A, B, C, D or ID, Name, Dept"
                            spellcheck="false"
                            autocomplete="off"
                        >
                        <span class="input-hint">Use commas for multi-character attributes</span>
                    </div>

                    <div class="form-group">
                        <label for="fds-input">
                            <span class="label-icon">F</span> Functional Dependencies
                        </label>
                        <textarea
                            id="fds-input"
                            rows="6"
                            placeholder="e.g.&#10;A -> B&#10;B -> C&#10;AC -> D"
                            spellcheck="false"
                        ></textarea>
                        <span class="input-hint">One FD per line. Use <code>-></code> or <code>&rarr;</code>.</span>
                    </div>

                    <button id="compute-btn" type="button">
                        <span class="btn-text">Compute Keys</span>
                        <span class="btn-loader" hidden>
                            <span class="spinner"></span> Analyzing...
                        </span>
                    </button>

                    <div id="error-msg" class="error-msg" hidden></div>
                </div>
            </section>

            <section class="panel output-panel">
                <div class="panel-header">
                    <span class="panel-dot"></span>
                    <span class="panel-dot"></span>
                    <span class="panel-dot"></span>
                    <span class="panel-title">Output</span>
                </div>
                <div class="panel-body">
                    <div id="output-placeholder" class="output-placeholder">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
                            <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
                            <polyline points="7.5 4.21 12 6.81 16.5 4.21"/>
                            <line x1="12" y1="22.08" x2="12" y2="11.73"/>
                        </svg>
                        <p>Enter attributes and FDs, then click <strong>Compute Keys</strong>.</p>
                    </div>

                    <div id="results-container" class="results-container" hidden>
                        <div class="result-section">
                            <h2 class="result-title">
                                <span class="result-icon">CK</span> Candidate Keys
                            </h2>
                            <div id="candidate-keys" class="keys-grid"></div>
                        </div>

                        <div class="result-section">
                            <h2 class="result-title">
                                <span class="result-icon">SK</span> Superkeys
                            </h2>
                            <div id="superkeys" class="keys-grid"></div>
                        </div>

                        <div class="result-section info-section">
                            <h2 class="result-title">
                                <span class="result-icon">i</span> Computation Info
                            </h2>
                            <div id="info-panel" class="info-grid"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <span>DBMS Key Analyzer - Spring Boot API + Vanilla JS frontend</span>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
